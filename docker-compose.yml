version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: actionseg-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - actionseg-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: actionseg-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - PYTHONPATH=/app
      - CONFIGS_DIR=/configs
    volumes:
      - ./backend/storage:/app/storage
      - ./configs:/configs
    depends_on:
      - redis
    networks:
      - actionseg-net

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: actionseg-celery-worker
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=3
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - PYTHONPATH=/app
      - CONFIGS_DIR=/configs
    volumes:
      - ./backend/storage:/app/storage
      - ./configs:/configs
    depends_on:
      - redis
    networks:
      - actionseg-net

  streamlit:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    container_name: actionseg-streamlit
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api
    networks:
      - actionseg-net

volumes:
  redis_data:

networks:
  actionseg-net:
    driver: bridge
